name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Sensitive keyword guard
        run: python scripts/keyword_guard.py
      - name: Test
        run: pytest -q
      - name: CLI smoke
        run: |
          mdprep ingest --input examples/demo.md --output out/demo.jsonl --doc-id smoke
          mdprep validate --input out/demo.jsonl
