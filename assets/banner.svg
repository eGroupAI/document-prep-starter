<svg width="1200" height="400" viewBox="0 0 1200 400"
  xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="document-prep-starter by eGroupAI">
  <defs>
    <style>
      @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
      @keyframes slideUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
      @keyframes drawLine { to{stroke-dashoffset:0} }
      @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      @keyframes pulse    { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:.9;transform:scale(1.4)} }
      @keyframes bgShift  { 0%{stop-color:#060E1F} 50%{stop-color:#081A30} 100%{stop-color:#060E1F} }
      @keyframes shimmer  { 0%,100%{stop-color:#7DD3F0} 50%{stop-color:#E8F7FF} }
      @keyframes shimmerB { 0%,100%{stop-color:#CDEEFF} 50%{stop-color:#FFFFFF} }
      .t0  { opacity:0; animation:fadeIn  .7s  .1s forwards }
      .t1  { opacity:0; animation:fadeIn  .7s  .4s forwards }
      .di  { opacity:0; animation:fadeIn  .5s  .5s forwards }
      .dl1 { stroke-dasharray:130; stroke-dashoffset:130; animation:drawLine .4s  .9s forwards }
      .dl2 { stroke-dasharray:100; stroke-dashoffset:100; animation:drawLine .35s 1.1s forwards }
      .dl3 { stroke-dasharray:115; stroke-dashoffset:115; animation:drawLine .35s 1.3s forwards }
      .dl4 { stroke-dasharray:80;  stroke-dashoffset:80;  animation:drawLine .3s  1.5s forwards }
      .arr { stroke-dasharray:180; stroke-dashoffset:180; animation:drawLine .6s  1.7s forwards }
      .arh { opacity:0; animation:fadeIn  .3s  2.2s forwards }
      .alb { opacity:0; animation:fadeIn  .4s  1.9s forwards }
      .c1  { opacity:0; animation:slideUp .45s 2.3s forwards }
      .c2  { opacity:0; animation:slideUp .45s 2.6s forwards }
      .c3  { opacity:0; animation:slideUp .45s 2.9s forwards }
      .bg1 { opacity:0; animation:fadeIn  .6s  3.2s forwards }
      .p1  { animation:pulse 2.4s 2.0s infinite }
      .p2  { animation:pulse 2.8s 2.3s infinite }
      .p3  { animation:pulse 2.2s 2.1s infinite }
      .ic  { animation:float 4s   1.5s infinite }
    </style>
    <linearGradient id="bg0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#050C1A">
        <animate attributeName="stop-color" values="#050C1A;#071525;#050C1A" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#082438">
        <animate attributeName="stop-color" values="#082438;#0A2E48;#082438" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7DD3F0">
        <animate attributeName="stop-color" values="#7DD3F0;#C8EEFF;#7DD3F0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%"  stop-color="#E8F7FF">
        <animate attributeName="stop-color" values="#E8F7FF;#FFFFFF;#E8F7FF" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7DD3F0">
        <animate attributeName="stop-color" values="#7DD3F0;#C8EEFF;#7DD3F0" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#102E45"/>
      <stop offset="100%" stop-color="#071C2C"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0B3250"/>
      <stop offset="100%" stop-color="#061E30"/>
    </linearGradient>
    <filter id="gw">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg0)"/>

  <!-- Ambient glows -->
  <circle cx="160"  cy="390" r="220" fill="#0A5878" opacity=".13" filter="url(#sg)"/>
  <circle cx="1080" cy="20"  r="180" fill="#0D4F70" opacity=".10" filter="url(#sg)"/>

  <!-- Subtle grid -->
  <g opacity=".035" stroke="#4AAED8" stroke-width=".5">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="240"  y1="0" x2="240"  y2="400"/>
    <line x1="480"  y1="0" x2="480"  y2="400"/>
    <line x1="720"  y1="0" x2="720"  y2="400"/>
    <line x1="960"  y1="0" x2="960"  y2="400"/>
  </g>

  <!-- Top: Title -->
  <g class="t0">
    <text x="600" y="58"
      text-anchor="middle" fill="url(#tg)"
      font-size="44" font-weight="700"
      font-family="'Segoe UI',system-ui,sans-serif">document-prep-starter</text>
  </g>

  <!-- Tagline -->
  <g class="t1">
    <text x="600" y="90"
      text-anchor="middle" fill="#6AADCA"
      font-size="16"
      font-family="'Segoe UI',system-ui,sans-serif">
      .md / .txt  ?  chunk JSONL  ?  eGroupAI ??????
    </text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="108" x2="1120" y2="108" stroke="#1B4F6A" stroke-width=".8" opacity=".5"/>

  <!-- === DOCUMENT ICON (left) === -->
  <g transform="translate(110,130)">
    <g class="di ic">
      <!-- Body -->
      <rect x="0" y="0" width="158" height="196" rx="8"
        fill="url(#dg)" stroke="#1E5C7A" stroke-width="1.5"/>
      <!-- Corner fold -->
      <path d="M 128 0 L 158 30 L 128 30 Z" fill="#1E5C7A"/>
      <path d="M 128 0 L 158 30 L 128 30 Z" fill="#0D2235" opacity=".5"/>
      <!-- .md badge -->
      <rect x="8" y="8" width="34" height="17" rx="4" fill="#0D4060"/>
      <text x="25" y="20" text-anchor="middle" fill="#5BB8D4"
        font-size="10" font-family="monospace">.md</text>
    </g>
    <!-- Text lines (drawn in) -->
    <line class="dl1" x1="16" y1="58"  x2="142" y2="58"  stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
    <line class="dl2" x1="16" y1="84"  x2="114" y2="84"  stroke="#60A5FA" stroke-width="2"   stroke-linecap="round"/>
    <line class="dl3" x1="16" y1="110" x2="130" y2="110" stroke="#60A5FA" stroke-width="2"   stroke-linecap="round"/>
    <line class="dl4" x1="16" y1="136" x2="96"  y2="136" stroke="#60A5FA" stroke-width="2"   stroke-linecap="round"/>
    <!-- Input label -->
    <text x="79" y="216" text-anchor="middle" fill="#3A7A9A"
      font-size="12" font-family="'Segoe UI',sans-serif">Input</text>
  </g>

  <!-- === ARROW === -->
  <g transform="translate(308,218)">
    <!-- Track -->
    <line x1="20" y1="26" x2="158" y2="26" stroke="#0D3C50" stroke-width="1.5" stroke-dasharray="6 4"/>
    <!-- Animated arrow -->
    <path class="arr"
      d="M 22 26 L 148 26"
      stroke="#0A7EA4" stroke-width="3.5" fill="none"
      stroke-linecap="round"
      stroke-dasharray="180" stroke-dashoffset="180"/>
    <!-- Arrow head -->
    <g class="arh">
      <path d="M 136 14 L 160 26 L 136 38"
        stroke="#0A7EA4" stroke-width="3.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Label -->
    <text class="alb" x="90" y="13"
      text-anchor="middle" fill="#3A8BAE"
      font-size="13" font-family="monospace">mdprep</text>
    <!-- Particles -->
    <circle class="p1" cx="55"  cy="22" r="3" fill="#0A7EA4"/>
    <circle class="p2" cx="90"  cy="28" r="2.5" fill="#4ABADF"/>
    <circle class="p3" cx="120" cy="22" r="2.5" fill="#0A7EA4"/>
  </g>

  <!-- === JSON CHUNKS (right) === -->
  <g transform="translate(530,128)">
    <!-- Chunk 1 -->
    <g class="c1">
      <rect x="0"  y="0"  width="330" height="54" rx="6"
        fill="url(#cg)" stroke="#1A5272" stroke-width="1.3"/>
      <text x="14" y="20" fill="#7ECDE8" font-size="12.5" font-family="monospace">&#123; "doc_id": "report-001",</text>
      <text x="14" y="40" fill="#A8DDEF" font-size="12.5" font-family="monospace">  "chunk_id": "0001", "text": "#..." &#125;</text>
    </g>
    <!-- Chunk 2 -->
    <g class="c2">
      <rect x="0"  y="64" width="330" height="54" rx="6"
        fill="url(#cg)" stroke="#1A5272" stroke-width="1.3"/>
      <text x="14" y="84" fill="#7ECDE8" font-size="12.5" font-family="monospace">&#123; "doc_id": "report-001",</text>
      <text x="14" y="104" fill="#A8DDEF" font-size="12.5" font-family="monospace">  "chunk_id": "0002", "text": "..." &#125;</text>
    </g>
    <!-- Chunk 3 -->
    <g class="c3">
      <rect x="0"  y="128" width="330" height="54" rx="6"
        fill="url(#cg)" stroke="#1A5272" stroke-width="1.3"/>
      <text x="14" y="148" fill="#7ECDE8" font-size="12.5" font-family="monospace">&#123; "doc_id": "report-001",</text>
      <text x="14" y="168" fill="#A8DDEF" font-size="12.5" font-family="monospace">  "chunk_id": "0003", "text": "..." &#125;</text>
    </g>
    <!-- Output label -->
    <text x="165" y="202" text-anchor="middle" fill="#3A7A9A"
      font-size="12" font-family="'Segoe UI',sans-serif">Output ? JSONL</text>
  </g>

  <!-- Bottom pill -->
  <g class="bg1">
    <rect x="360" y="352" width="480" height="30" rx="15"
      fill="#091C2E" stroke="#1A4A62" stroke-width="1"/>
    <text x="600" y="372" text-anchor="middle" fill="#4A96B8"
      font-size="13" font-family="'Segoe UI',sans-serif">
      MIT License ? Free &amp; Open Source ? Python 3.11+ ? github.com/eGroupAI
    </text>
  </g>
</svg>
